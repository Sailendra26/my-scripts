- name: filters
  hosts: local 
  connection: local # Ansible is connecting to the localhost

  vars:
    Goals: Learning, Job-switch, Family-happiness # string
    name: AarAnya
    ipAddress: 101.0.201.0

    # dictinary/map
    Course:
      tool: ansible
      duration: 9
      days: 7
    # List of dictionaries
    Success:
      - key: patience
        value: 1
      - key: consistency
        value: 2
      - key: winner
        value: 3

  tasks:
  - name: default filter
    ansible.builtin.debug:
      msg: "name is: {{ NAME | default ('Megham') }} "

  - name: string to list conversion
    ansible.builtin.debug:
      msg: "conversion is: {{ Goals | split(',') }}"

  - name: dictionary/map to list conversion
    ansible.builtin.debug:
      msg: "conversion is: {{ Course | dict2items }}" # here, items--> list

  - name: list to dictionary/map conversion
    ansible.builtin.debug:
      msg: "conversion is: {{ Success | items2dict }}" # here, items--> list

  - name: read the data and take into a variable
    ansible.builtin.set_fact:
      student_yaml: "{{ lookup( 'file', './18-student.yaml' ) | from_yaml }}"

  - name: yaml to JSON conversion
    ansible.builtin.debug:
      msg: "conversion is: {{ student_yaml | to_json }}"

  - name: save JSON into a file
    ansible.builtin.copy:
      dest: ./student-data.json
      content: "{{ student_yaml | to_nice_json }}"

  - name: copy file from source to detsination path
    ansible.builtin.copy:
      src: /home/ec2-user/my-scripts/Ansible/18-student.yaml
      dest: /tmp/

  - name: covert to uppercase
    ansible.builtin.debug:
      msg: "conversion is: {{ name | upper }}"

  - name: convert to lowercase
    ansible.builtin.debug:
      msg: "conversion is: {{ name | lower }}"

  - name: check ipv4 is valid or not 
    ansible.builtin.debug:
      msg: "ip is: {{ ipAddress | ansible.utils.ipv4  }}"

  - name: first normal command
    ansible.builtin.command: ls -l
    register: output

  - name: print first normal command output
    ansible.builtin.debug: 
      msg: "{{ output }}"

  - name: first shell command
    ansible.builtin.shell: hostname >> /tmp/logs.txt
    register: result

  - name: first shell command output
    ansible.builtin.debug: 
      msg: "{{ result }}"

  - name: second normal command
    ansible.builtin.command: touch file1.txt
    register: variable1

  - name: print second normal command output
    ansible.builtin.debug: 
      msg: "{{ variable1 }}"

  - name: second shell command
    ansible.builtin.shell: cat /etc/passwd | grep root
    register: variable2

  - name: print second shell command output
    ansible.builtin.debug: 
      msg: "{{ variable2 }}"





