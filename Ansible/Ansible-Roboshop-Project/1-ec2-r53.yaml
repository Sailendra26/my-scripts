- name: create ec2 instances and update route53 records
  hosts: local
  connection: local # Ansible connects to the localhost

  vars:
    AMI_ID: "ami-0220d79f3f480ecf5"
    SG_ID: "sg-00f8aad7ab69831fd" # replace with your SG-ID
    ZONE_ID: "Z04223522WLWW3RAUWSAN" # this is your Hosted zone-ID
    DOMAIN_NAME: "devopsmegham.fun" # this is your domain name

    instances:
    - mongodb
    # - reddis

    tasks:
    - name: create ec2 instances 
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.micro
        security_group: "{{ SG_ID }}"
        image_id: "{{ AMI_ID }}"
        tags:
          Name: "{{ item }}"
      loop: "{{ instances }}"
      register: ec2_output

    # create r53 records
    
